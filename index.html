<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>College Buddy – Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1C3A52;--navy2:#24485F;--navyL:#2e5876;
  --green:#6BBF4E;--greenD:#52a837;
  --amber:#F5A623;--amberD:#d4860a;
  --bg:#EEF5FB;--white:#fff;--border:#daeaf5;--muted:#7a9ab0;
  --msg-out:#DCF8C6;--msg-in:#fff;
  --tick-blue:#4FC3F7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--navy);overflow:hidden}
body{display:flex;flex-direction:column}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;animation:fadeUp .3s ease both}
.screen.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── AUTH ── */
.auth-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,#1a4a30 100%)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .mascot{font-size:3.5rem;display:block;margin-bottom:6px}
.auth-logo h1{font-family:'Poppins',sans-serif;color:#fff;font-size:1.6rem;font-weight:800}
.auth-logo h1 span{color:var(--green)}
.auth-logo p{color:rgba(255,255,255,.55);font-size:.82rem;margin-top:3px}
.auth-card{background:var(--white);border-radius:24px;padding:24px 22px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.auth-tabs{display:flex;gap:0;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border-radius:10px;font-weight:800;font-size:.85rem;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.2s}
.auth-tab.active{background:var(--white);color:var(--navy);box-shadow:0 2px 8px rgba(28,58,82,.12)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:11px 14px;border-radius:12px;border:2px solid var(--border);font-family:'Nunito',sans-serif;font-size:.92rem;color:var(--navy);outline:none;transition:.2s;background:var(--white)}
.form-group input:focus,.form-group select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(107,191,78,.15)}
.btn-primary{width:100%;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--greenD));color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(107,191,78,.35)}
.btn-primary:active{transform:scale(.97)}
.auth-err{color:#e55;font-size:.78rem;margin-top:8px;text-align:center;min-height:18px}

/* ── MAIN APP LAYOUT ── */
.app-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.top-bar{background:var(--navy);padding:14px 18px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(28,58,82,.3)}
.top-bar .logo-text{font-family:'Poppins',sans-serif;color:#fff;font-weight:800;font-size:1.1rem}
.top-bar .logo-text span{color:var(--green)}
.top-bar .tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(107,191,78,.5);background:rgba(107,191,78,.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer}

/* TAB CONTENT */
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden}
.tab-pane{display:none;height:100%;flex-direction:column}
.tab-pane.active{display:flex}

/* BOTTOM NAV */
.bottom-nav{background:var(--white);border-top:2px solid var(--border);display:flex;flex-shrink:0;box-shadow:0 -3px 16px rgba(28,58,82,.09);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;gap:3px;cursor:pointer;border:none;background:transparent;position:relative;transition:.15s}
.nav-btn .nicon{font-size:1.3rem;transition:transform .2s}
.nav-btn .nlabel{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;transition:color .2s}
.nav-btn.active .nlabel{color:var(--green)}
.nav-btn.active .nicon{transform:scale(1.12)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--green);border-radius:0 0 3px 3px}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#e55;color:#fff;font-size:.55rem;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--white)}

/* ── CHATS TAB ── */
.chat-list{flex:1;overflow-y:auto;padding:8px 0}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border)}
.chat-item:active{background:rgba(107,191,78,.07)}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navyL));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;border:2px solid var(--border)}
.chat-avatar.broadcast{background:linear-gradient(135deg,var(--amber),#fcc55a)}
.chat-info{flex:1;min-width:0}
.chat-name{font-weight:800;font-size:.93rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:.68rem;color:var(--muted)}
.chat-unread{background:var(--green);color:#fff;font-size:.62rem;font-weight:900;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.section-header{padding:8px 18px 4px;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:var(--bg)}

/* ── CHAT WINDOW ── */
.chat-window{display:none;flex-direction:column;height:100%;background:#e5ddd5;position:absolute;inset:0;z-index:200;animation:slideIn .25s ease both}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.chat-window.active{display:flex}
.cw-header{background:var(--navy);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(28,58,82,.25)}
.cw-back{color:#fff;font-size:1.3rem;cursor:pointer;padding:4px;border:none;background:transparent}
.cw-avatar{width:38px;height:38px;border-radius:50%;background:rgba(107,191,78,.2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:2px solid rgba(255,255,255,.25)}
.cw-info{flex:1}
.cw-name{font-family:'Poppins',sans-serif;color:#fff;font-weight:700;font-size:.95rem}
.cw-sub{color:rgba(255,255,255,.55);font-size:.7rem}
.cw-msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:6px;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231C3A52' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}

.msg-row{display:flex;flex-direction:column;max-width:80%}
.msg-row.out{align-self:flex-end;align-items:flex-end}
.msg-row.in{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:.67rem;font-weight:700;color:var(--green);margin-bottom:2px;padding-left:4px}
.msg-bubble{padding:8px 12px 6px;border-radius:12px;font-size:.88rem;line-height:1.45;position:relative;word-break:break-word}
.msg-row.out .msg-bubble{background:var(--msg-out);border-bottom-right-radius:4px}
.msg-row.in .msg-bubble{background:var(--msg-in);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.msg-meta{display:flex;align-items:center;gap:4px;margin-top:3px;padding-right:2px}
.msg-time{font-size:.62rem;color:var(--muted)}
.msg-ticks{font-size:.78rem;color:var(--muted);line-height:1}
.msg-ticks.read{color:var(--tick-blue)}
.date-divider{text-align:center;font-size:.7rem;color:var(--muted);background:rgba(255,255,255,.7);border-radius:8px;padding:3px 10px;margin:6px auto;font-weight:700}
.broadcast-bubble{background:linear-gradient(135deg,#fff9e6,#fff3cc);border-left:3px solid var(--amber);border-radius:0 12px 12px 0!important}

.cw-input-bar{background:var(--white);padding:8px 12px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;border-top:1px solid var(--border)}
.cw-input-bar textarea{flex:1;padding:10px 14px;border-radius:22px;border:2px solid var(--border);font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--navy);outline:none;resize:none;max-height:100px;line-height:1.4;transition:.2s}
.cw-input-bar textarea:focus{border-color:var(--green)}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;box-shadow:0 2px 8px rgba(107,191,78,.35)}
.send-btn:active{transform:scale(.92)}

/* ── UPDATES TAB ── */
.updates-list{flex:1;overflow-y:auto;padding:8px 0}
.broadcast-item{background:var(--white);margin:8px 12px;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(28,58,82,.07);cursor:pointer;transition:.15s;border:1.5px solid var(--border)}
.broadcast-item:active{transform:scale(.99)}
.bi-header{padding:12px 14px 10px;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--navy),var(--navy2))}
.bi-icon{width:36px;height:36px;border-radius:12px;background:rgba(245,166,35,.25);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.bi-title{font-family:'Poppins',sans-serif;color:#fff;font-weight:700;font-size:.88rem}
.bi-date{color:rgba(255,255,255,.5);font-size:.68rem;margin-top:1px}
.bi-body{padding:12px 14px;font-size:.85rem;line-height:1.55;color:var(--navy)}

/* ── SEARCH TAB ── */
.search-wrap{padding:12px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.search-input-wrap{position:relative}
.search-input-wrap input{width:100%;padding:11px 14px 11px 40px;border-radius:14px;border:2px solid var(--border);font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--navy);outline:none;transition:.2s}
.search-input-wrap input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(107,191,78,.15)}
.search-input-wrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;opacity:.4}
.search-results{flex:1;overflow-y:auto;padding:8px 0}
.college-group{margin-bottom:4px}
.user-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(218,234,245,.6)}
.user-item:active{background:rgba(107,191,78,.07)}
.user-item .ua{width:42px;height:42px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;border:2px solid var(--border)}
.user-item .un{font-weight:800;font-size:.9rem}
.user-item .uc{font-size:.72rem;color:var(--muted);margin-top:1px}
.user-item .chat-now{margin-left:auto;background:rgba(107,191,78,.1);border:1px solid rgba(107,191,78,.3);color:var(--greenD);border-radius:20px;padding:4px 10px;font-size:.7rem;font-weight:700}

/* ── PROFILE TAB ── */
.profile-wrap{flex:1;overflow-y:auto;padding:20px 16px}
.profile-card{background:var(--white);border-radius:20px;padding:24px;text-align:center;box-shadow:0 4px 20px rgba(28,58,82,.08);margin-bottom:16px}
.profile-emoji-big{font-size:4rem;cursor:pointer;display:block;margin:0 auto 10px;transition:.2s}
.profile-emoji-big:active{transform:scale(.9)}
.profile-name{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:800;color:var(--navy)}
.profile-college{font-size:.82rem;color:var(--muted);margin-top:3px}
.profile-number{font-size:.82rem;color:var(--muted);margin-top:2px}
.emoji-picker{background:var(--white);border-radius:20px;padding:16px;box-shadow:0 4px 20px rgba(28,58,82,.08);margin-bottom:16px}
.emoji-picker h3{font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.emoji-opt{font-size:1.6rem;cursor:pointer;text-align:center;padding:6px;border-radius:10px;border:2px solid transparent;transition:.15s}
.emoji-opt:active{transform:scale(.85)}
.emoji-opt.selected{border-color:var(--green);background:rgba(107,191,78,.1)}
.logout-btn{width:100%;padding:13px;border-radius:14px;border:2px solid #e55;background:transparent;color:#e55;font-family:'Poppins',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s}
.logout-btn:active{background:rgba(229,85,85,.08)}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:9px 18px;border-radius:20px;font-size:.82rem;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING OVERLAY ── */
.loading-overlay{position:fixed;inset:0;background:rgba(28,58,82,.5);display:flex;align-items:center;justify-content:center;z-index:500;display:none}
.loading-overlay.active{display:flex}
.loader-card{background:#fff;border-radius:20px;padding:24px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MISC ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;text-align:center;color:var(--muted)}
.empty-state .em{font-size:3rem;margin-bottom:10px}
.empty-state p{font-size:.85rem}
</style>
</head>
<body>

<!-- ═══════════ AUTH SCREEN ═══════════ -->
<div class="screen active" id="screen-auth">
  <div class="auth-wrap">
    <div class="auth-logo">
      <span class="mascot">🎓</span>
      <h1>College <span>Buddy</span></h1>
      <p>Connect with students across colleges</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="showAuthTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <div id="auth-login">
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="login-number" placeholder="10-digit number" maxlength="10"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Your password"/>
        </div>
        <button class="btn-primary" onclick="doLogin()">Login →</button>
        <div class="auth-err" id="login-err"></div>
      </div>

      <!-- REGISTER -->
      <div id="auth-register" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="reg-number" placeholder="10-digit number" maxlength="10"/>
        </div>
        <div class="form-group">
          <label>College</label>
          <select id="reg-college">
            <option value="">Select your college</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Create a password"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat password"/>
        </div>
        <button class="btn-primary" onclick="doRegister()">Create Account →</button>
        <div class="auth-err" id="reg-err"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ MAIN APP SCREEN ═══════════ -->
<div class="screen" id="screen-app">
  <div class="app-wrap">

    <!-- TOP BAR -->
    <div class="top-bar">
      <span style="font-size:1.4rem">🎓</span>
      <span class="logo-text">College <span>Buddy</span></span>
      <div class="tb-right">
        <div class="avatar-btn" id="top-avatar" onclick="switchTab('profile')">😊</div>
      </div>
    </div>

    <!-- TAB CONTENT -->
    <div class="tab-content" style="position:relative">

      <!-- CHATS PANE -->
      <div class="tab-pane active" id="pane-chats">
        <div class="chat-list" id="chat-list">
          <div class="empty-state">
            <div class="em">💬</div>
            <p>No chats yet. Search for users to start chatting!</p>
          </div>
        </div>
        <!-- CHAT WINDOW (slides over) -->
        <div class="chat-window" id="chat-window">
          <div class="cw-header">
            <button class="cw-back" onclick="closeChat()">←</button>
            <div class="cw-avatar" id="cw-avatar">😊</div>
            <div class="cw-info">
              <div class="cw-name" id="cw-name">Name</div>
              <div class="cw-sub" id="cw-sub">College</div>
            </div>
          </div>
          <div class="cw-msgs" id="cw-msgs"></div>
          <div class="cw-input-bar" id="cw-input-bar">
            <textarea id="msg-input" rows="1" placeholder="Type a message…" onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>

      <!-- UPDATES PANE -->
      <div class="tab-pane" id="pane-updates">
        <div class="updates-list" id="updates-list">
          <div class="empty-state">
            <div class="em">📢</div>
            <p>No broadcasts yet.</p>
          </div>
        </div>
      </div>

      <!-- SEARCH PANE -->
      <div class="tab-pane" id="pane-search">
        <div class="search-wrap">
          <div class="search-input-wrap">
            <span class="si">🔍</span>
            <input type="text" id="search-input" placeholder="Search by name or college…" oninput="doSearch()"/>
          </div>
        </div>
        <div class="search-results" id="search-results">
          <div class="empty-state">
            <div class="em">🔎</div>
            <p>Search for students by name or college.</p>
          </div>
        </div>
      </div>

      <!-- PROFILE PANE -->
      <div class="tab-pane" id="pane-profile">
        <div class="profile-wrap">
          <div class="profile-card">
            <span class="profile-emoji-big" id="profile-emoji" onclick="toggleEmojiPicker()">😊</span>
            <div class="profile-name" id="profile-name">Name</div>
            <div class="profile-college" id="profile-college">College</div>
            <div class="profile-number" id="profile-number">📱 Number</div>
            <p style="font-size:.72rem;color:var(--muted);margin-top:8px">Tap your emoji to change it</p>
          </div>
          <div class="emoji-picker" id="emoji-picker" style="display:none">
            <h3>Choose your avatar</h3>
            <div class="emoji-grid" id="emoji-grid"></div>
          </div>
          <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>
      </div>

    </div><!-- /tab-content -->

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-chats" onclick="switchTab('chats')">
        <span class="nicon">💬</span>
        <span class="nlabel">Chats</span>
        <span class="nav-badge" id="badge-chats" style="display:none">0</span>
      </button>
      <button class="nav-btn" id="nav-updates" onclick="switchTab('updates')">
        <span class="nicon">📢</span>
        <span class="nlabel">Updates</span>
        <span class="nav-badge" id="badge-updates" style="display:none">0</span>
      </button>
      <button class="nav-btn" id="nav-search" onclick="switchTab('search')">
        <span class="nicon">🔎</span>

<script>
// ════════════════════════════════════════════════════
//  CONFIG  — set your Google Apps Script Web App URL
// ════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxCLDxZy5j5gfVfjmMN6ySyruvXGeAKtv27v7dkFMEq3HDa1WXg8MhIpiEXYx3Bi3yJHA/exec';

// ── Add your colleges here ──────────────────────────
const COLLEGES = [
  "B.M.D. College, Dayalpur",
  "CN College, Sahebganj",
  "Dr. R.M.L.S. College, Muzaffarpur",
  "Indu Devi Ranjeet Kumar Prakash",
  "J.L. College, Hajipur",

  "L.N. College, Bhagwanpur",
  "L.N.D. College, Motihari",
  "L.S. College, Muzaffarpur",
  "M.S.M. Samata College, Jandah",
  "M.S.S.G. College, Areraj",
  "M.D.D.M. College, Muzaffarpur",
  "M.J.K. College, Bettiah",
  "M.P.S. Sc. College, Muzaffarpur",
  "M.S. College, Motihari",
  "Nitishwar College, Muzaffarpur",

  "R.D.S. College, Muzaffarpur",
  "R.L.S.Y. College, Bettiah",
  "R.N. College, Hajipur",

  "R.S.S. Sc. College, Sitamarhi",
  "Rameshwar Mahavidyalaya, Muzaffarpur",
  "S.R.A.P. College, Barachakia",
  "S.L.K. College, Sitamarhi",
  "S.N.S. College, Motihari",
  "S.R.K.G. College, Sitamarhi",
  "T. P. Verma College, Narkatiyaganj",
  "Umesh Kumar Ranjeet Vidayalya",
  "Vaishali Institute of Business and Rural Management, Muzaffarpur","Other"
];

const EMOJIS = ['😊','😎','🤓','🦁','🐯','🦊','🐧','🐸','🦋','🌟','🎯','🚀','⚡','🌈','🎓','📚','💡','🔥','🌺','🎸','🏆','💎','🌙','🍀','🎭'];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let currentUser   = null;
let allUsers      = [];
let chatPartner   = null;
let chatInterval  = null;
let pollInterval  = null;
let lastMsgTs     = 0;

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
(function init() {
  // Populate college dropdown
  const sel = document.getElementById('reg-college');
  COLLEGES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = c;
    sel.appendChild(opt);
  });

  // Emoji picker
  const grid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const d = document.createElement('div');
    d.className = 'emoji-opt';
    d.textContent = e;
    d.onclick = () => selectEmoji(e);
    grid.appendChild(d);
  });

  // Check stored session
  const saved = localStorage.getItem('cb_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      enterApp();
    } catch(e) { localStorage.removeItem('cb_user'); }
  }
})();

// ════════════════════════════════════════════════════
//  API HELPER
// ════════════════════════════════════════════════════
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res  = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

// ════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════
function showAuthTab(tab) {
  document.getElementById('auth-login').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('auth-register').style.display = tab==='register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
  });
}

async function doLogin() {
  const number = document.getElementById('login-number').value.trim();
  const pass   = document.getElementById('login-pass').value;
  const err    = document.getElementById('login-err');
  err.textContent = '';

  if (!/^\d{10}$/.test(number)) { err.textContent = '⚠ Enter a valid 10-digit number.'; return; }
  if (!pass) { err.textContent = '⚠ Enter your password.'; return; }

  showLoading('Logging in…');
  try {
    const res = await api({ action:'login', number, pass });
    if (res.ok) {
      currentUser = res.user;
      localStorage.setItem('cb_user', JSON.stringify(currentUser));
      enterApp();
    } else {
      err.textContent = '⚠ ' + (res.error || 'Invalid credentials.');
    }
  } catch(e) { err.textContent = '⚠ Network error. Try again.'; }
  hideLoading();
}

async function doRegister() {
  const name    = document.getElementById('reg-name').value.trim();
  const number  = document.getElementById('reg-number').value.trim();
  const college = document.getElementById('reg-college').value;
  const pass    = document.getElementById('reg-pass').value;
  const confirm = document.getElementById('reg-confirm').value;
  const err     = document.getElementById('reg-err');
  err.textContent = '';

  if (!name)               { err.textContent = '⚠ Enter your name.'; return; }
  if (!/^\d{10}$/.test(number)) { err.textContent = '⚠ Enter a valid 10-digit number.'; return; }
  if (!college)            { err.textContent = '⚠ Select your college.'; return; }
  if (pass.length < 6)     { err.textContent = '⚠ Password must be at least 6 characters.'; return; }
  if (pass !== confirm)    { err.textContent = '⚠ Passwords do not match.'; return; }

  showLoading('Creating account…');
  try {
    const res = await apiPost({ action:'register', name, number, college, pass, emoji:'😊' });
    if (res.ok) {
      currentUser = res.user;
      localStorage.setItem('cb_user', JSON.stringify(currentUser));
      enterApp();
    } else {
      err.textContent = '⚠ ' + (res.error || 'Registration failed.');
    }
  } catch(e) { err.textContent = '⚠ Network error. Try again.'; }
  hideLoading();
}

function doLogout() {
  clearInterval(pollInterval);
  clearInterval(chatInterval);
  currentUser = null;
  localStorage.removeItem('cb_user');
  document.getElementById('screen-auth').classList.add('active');
  document.getElementById('screen-app').classList.remove('active');
  showAuthTab('login');
}

// ════════════════════════════════════════════════════
//  APP ENTRY
// ════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('screen-auth').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  hideLoading();
  renderProfile();
  loadAll();
  pollInterval = setInterval(loadAll, 8000); // poll every 8s
}

async function loadAll() {
  await Promise.all([loadUsers(), loadChats(), loadBroadcasts()]);
}

// ════════════════════════════════════════════════════
//  USERS
// ════════════════════════════════════════════════════
async function loadUsers() {
  document.getElementById('search-results').innerHTML = `
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:8px">Loading users…</p>
    </div>`;
  try {
    const res = await api({ action:'getUsers' });
    if (res.ok) { allUsers = res.users; renderSearch(); }
  } catch(e) {
    document.getElementById('search-results').innerHTML = `
      <div class="empty-state"><div class="em">😕</div><p>Failed to load users.</p></div>`;
  }
}

// ════════════════════════════════════════════════════
//  CHATS
// ════════════════════════════════════════════════════
async function loadChats() {
  document.getElementById('chat-list').innerHTML = `
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:8px">Loading chats…</p>
    </div>`;
  try {
    const res = await api({ action:'getChats', userNumber: currentUser.number });
    if (res.ok) renderChatList(res.chats);
  } catch(e) {}
}

function renderChatList(chats) {
  const el = document.getElementById('chat-list');
  if (!chats || !chats.length) {
    el.innerHTML = `<div class="empty-state"><div class="em">💬</div><p>No chats yet. Find users in Search!</p></div>`;
    return;
  }
  let unread = 0;
  el.innerHTML = chats.map(c => {
    if (c.unread) unread += c.unread;
    const partner = allUsers.find(u => u.number === (c.with === currentUser.number ? c.from : c.with)) || {};
    const emoji = partner.emoji || '😊';
    return `
      <div class="chat-item" onclick="openChat('${c.with === currentUser.number ? c.from : c.with}')">
        <div class="chat-avatar">${emoji}</div>
        <div class="chat-info">
          <div class="chat-name">${partner.name || c.peerName || 'Unknown'}</div>
          <div class="chat-preview">${c.lastMsg || ''}</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">${formatTime(c.timestamp)}</div>
          ${c.unread ? `<div class="chat-unread">${c.unread}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  const badge = document.getElementById('badge-chats');
  if (unread > 0) { badge.style.display='flex'; badge.textContent=unread; }
  else { badge.style.display='none'; }
}

async function openChat(partnerNumber) {
  const partner = allUsers.find(u => u.number === partnerNumber);
  if (!partner) { showToast('User not found'); return; }
  chatPartner = partner;

  document.getElementById('cw-avatar').textContent = partner.emoji || '😊';
  document.getElementById('cw-name').textContent   = partner.name;
  document.getElementById('cw-sub').textContent    = partner.college;

  const cw = document.getElementById('chat-window');
  cw.classList.add('active');

  await fetchMessages();
  clearInterval(chatInterval);
  chatInterval = setInterval(fetchMessages, 4000);
}

function closeChat() {
  document.getElementById('chat-window').classList.remove('active');
  clearInterval(chatInterval);
  chatPartner = null;
  loadChats();
}

async function fetchMessages() {
  if (!chatPartner) return;
  const container = document.getElementById('cw-msgs');
  if (!container.children.length) {
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.6">
        <div class="spinner"></div>
        <p style="font-size:.8rem;color:var(--muted)">Loading messages…</p>
      </div>`;
  }
  try {
    const res = await api({
      action: 'getMessages',
      userNumber: currentUser.number,
      partnerNumber: chatPartner.number
    });
    if (res.ok) renderMessages(res.messages);
  } catch(e) {}
}

function renderMessages(msgs) {
  const container = document.getElementById('cw-msgs');
  const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  let html = '';
  let lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.timestamp);
    const dateStr = d.toLocaleDateString('en-IN', {day:'numeric',month:'short'});
    if (dateStr !== lastDate) {
      html += `<div class="date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isOut = m.from === currentUser.number;
    const ticks = isOut ? (m.read ? `<span class="msg-ticks read">✓✓</span>` : `<span class="msg-ticks">✓✓</span>`) : '';
    html += `
      <div class="msg-row ${isOut?'out':'in'}">
        <div class="msg-bubble">${escHtml(m.text)}
          <div class="msg-meta">
            <span class="msg-time">${formatTime(m.timestamp)}</span>
            ${ticks}
          </div>
        </div>
      </div>`;
  });
  container.innerHTML = html;
  if (wasAtBottom) container.scrollTop = container.scrollHeight;
  // Mark as read
  if (msgs.some(m => m.from === chatPartner.number && !m.read)) {
    apiPost({ action:'markRead', userNumber:currentUser.number, partnerNumber:chatPartner.number });
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !chatPartner) return;
  input.value = '';
  input.style.height = 'auto';

  // Optimistic render
  const container = document.getElementById('cw-msgs');
  const div = document.createElement('div');
  div.className = 'msg-row out';
  div.innerHTML = `<div class="msg-bubble">${escHtml(text)}<div class="msg-meta"><span class="msg-time">now</span><span class="msg-ticks">✓✓</span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  try {
    await apiPost({
      action: 'sendMessage',
      from:   currentUser.number,
      to:     chatPartner.number,
      text
    });
    await fetchMessages();
  } catch(e) { showToast('Failed to send'); }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ════════════════════════════════════════════════════
//  BROADCASTS
// ════════════════════════════════════════════════════
async function loadBroadcasts() {
  document.getElementById('updates-list').innerHTML = `
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:8px">Loading updates…</p>
    </div>`;
  try {
    const res = await api({ action:'getBroadcasts' });
    if (res.ok) renderBroadcasts(res.broadcasts);
  } catch(e) {}
}

function renderBroadcasts(broadcasts) {
  const el = document.getElementById('updates-list');
  if (!broadcasts || !broadcasts.length) {
    el.innerHTML = `<div class="empty-state"><div class="em">📢</div><p>No broadcasts yet.</p></div>`;
    return;
  }
  el.innerHTML = broadcasts.map(b => `
    <div class="broadcast-item" onclick="openBroadcastChat('${b.id}','${escHtml(b.title)}')">
      <div class="bi-header">
        <div class="bi-icon">📣</div>
        <div>
          <div class="bi-title">${escHtml(b.title)}</div>
          <div class="bi-date">${formatTime(b.timestamp)} · From Admin</div>
        </div>
      </div>
      <div class="bi-body">${escHtml(b.body)}</div>
    </div>`).join('');
  document.getElementById('badge-updates').style.display='none';
}

function openBroadcastChat(id, title) {
  document.getElementById('cw-avatar').textContent = '📣';
  document.getElementById('cw-name').textContent   = title;
  document.getElementById('cw-sub').textContent    = 'Admin Broadcast';
  document.getElementById('cw-input-bar').style.display = 'none';

  const cw = document.getElementById('chat-window');
  cw.classList.add('active');

  // Show broadcast as message
  const container = document.getElementById('cw-msgs');
  const b = document.querySelector(`.broadcast-item[onclick*="${id}"]`);
  const body = b ? b.querySelector('.bi-body').textContent : '';
  container.innerHTML = `
    <div class="msg-row in">
      <div class="msg-sender">📣 Admin</div>
      <div class="msg-bubble broadcast-bubble">${escHtml(body)}<div class="msg-meta"><span class="msg-time">${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span></div></div>
    </div>`;
  container.scrollTop = container.scrollHeight;
  chatPartner = null;
}

// Restore input bar when closing broadcast
const origCloseChat = closeChat;
function closeChat() {
  document.getElementById('cw-input-bar').style.display = 'flex';
  document.getElementById('chat-window').classList.remove('active');
  clearInterval(chatInterval);
  chatPartner = null;
  loadChats();
}

// ════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════
function doSearch() {
  renderSearch();
}

function renderSearch() {
  const q   = (document.getElementById('search-input').value||'').toLowerCase().trim();
  const el  = document.getElementById('search-results');
  const others = allUsers.filter(u => u.number !== currentUser.number);
  const filtered = q
    ? others.filter(u => u.name.toLowerCase().includes(q) || u.college.toLowerCase().includes(q))
    : others;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="em">😕</div><p>No users found.</p></div>`;
    return;
  }

  // Group by college
  const byCollege = {};
  filtered.forEach(u => {
    if (!byCollege[u.college]) byCollege[u.college] = [];
    byCollege[u.college].push(u);
  });

  el.innerHTML = Object.keys(byCollege).map(college => `
    <div class="college-group">
      <div class="section-header">🎓 ${college}</div>
      ${byCollege[college].map(u => `
        <div class="user-item" onclick="startChat('${u.number}')">
          <div class="ua">${u.emoji||'😊'}</div>
          <div>
            <div class="un">${escHtml(u.name)}</div>
            <div class="uc">${escHtml(u.college)}</div>
          </div>
          <span class="chat-now">Chat →</span>
        </div>`).join('')}
    </div>`).join('');
}

function startChat(partnerNumber) {
  switchTab('chats');
  setTimeout(() => openChat(partnerNumber), 200);
}

// ════════════════════════════════════════════════════
//  PROFILE
// ════════════════════════════════════════════════════
function renderProfile() {
  if (!currentUser) return;
  document.getElementById('profile-emoji').textContent   = currentUser.emoji || '😊';
  document.getElementById('profile-name').textContent    = currentUser.name;
  document.getElementById('profile-college').textContent = '🎓 ' + currentUser.college;
  document.getElementById('profile-number').textContent  = '📱 ' + currentUser.number;
  document.getElementById('top-avatar').textContent      = currentUser.emoji || '😊';
  // Highlight selected emoji
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.classList.toggle('selected', el.textContent === currentUser.emoji);
  });
}

function toggleEmojiPicker() {
  const p = document.getElementById('emoji-picker');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function selectEmoji(emoji) {
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent===emoji));
  currentUser.emoji = emoji;
  localStorage.setItem('cb_user', JSON.stringify(currentUser));
  renderProfile();
  try {
    await apiPost({ action:'updateEmoji', number:currentUser.number, emoji });
    showToast('Avatar updated!');
  } catch(e) {}
  document.getElementById('emoji-picker').style.display = 'none';
}

// ════════════════════════════════════════════════════
//  NAV
// ════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
}

// ════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════
function showLoading(text='Please wait…') {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-overlay').classList.add('active');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate()===now.getDate()) {
    return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }
  if (diff < 172800000) return 'Yesterday';
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
